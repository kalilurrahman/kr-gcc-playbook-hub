name: CI

on:
  pull_request:
  push:
    branches: [main, dev]

jobs:
  verify:
    name: Lint, citations, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Citation consistency check
        run: npm run check:citations

      - name: Upload citation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: citation-report
          path: reports/
          if-no-files-found: warn

      - name: Build
        run: npm run build
